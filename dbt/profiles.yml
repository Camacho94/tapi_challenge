tapi:
  target: dev
  outputs:
    dev:
      type: postgres
      host:     "{{ env_var('DW_HOST',     'localhost') }}"
      port:     "{{ env_var('DW_PORT',     '5432') | int }}"
      user:     "{{ env_var('DW_USER',     'dw_user') }}"
      password: "{{ env_var('DW_PASSWORD', 'dw_pass') }}"
      dbname:   "{{ env_var('DW_DB',       'dw_db') }}"
      schema: public   # schema base, sobreescrito por +schema en cada capa
      threads: 4
      keepalives_idle: 0
