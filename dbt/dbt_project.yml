name: tapi_challenge
version: "1.0.0"
config-version: 2

profile: tapi

model-paths:    ["models"]
snapshot-paths: ["snapshots"]
seed-paths:     ["seeds"]
test-paths:     ["tests"]
macro-paths:    ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  tapi_challenge:
    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: view
      +schema: intermediate

    marts:
      +materialized: table
      +schema: marts

snapshots:
  tapi_challenge:
    +target_schema: snapshots
    +strategy: check
